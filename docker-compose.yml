services:
  postgres:
    image: postgres:16-alpine
    container_name: kaospacs-postgres
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Seoul}
      POSTGRES_DB: ${POSTGRES_DB:-orthanc}
      POSTGRES_USER: ${POSTGRES_USER:-orthanc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - ${POSTGRES_DATA:-/srv/docker/kaospacs/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orthanc} -d ${POSTGRES_DB:-orthanc}"]
      interval: 10s
      timeout: 5s
      retries: 10

  orthanc:
    image: orthancteam/orthanc:latest
    container_name: kaospacs-orthanc
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "${ORTHANC_INTERNAL_DICOM_PORT:-11112}"
    ports:
      - "${ORTHANC_HTTP_PORT:-8042}:8042"
    environment:
      TZ: ${TZ:-Asia/Seoul}
      ORTHANC__NAME: ${ORTHANC_NAME:-KaosPACS}
      ORTHANC__DICOM_AET: VIEWREX
      ORTHANC__DICOM_PORT: ${ORTHANC_INTERNAL_DICOM_PORT:-11112}
      ORTHANC__DICOM_SERVER_ENABLED: "true"
      ORTHANC__HTTP_PORT: "8042"
      ORTHANC__REMOTE_ACCESS_ALLOWED: "true"
      ORTHANC__AUTHENTICATION_ENABLED: "false"
      ORTHANC__STORAGE_DIRECTORY: /var/lib/orthanc/storage
      ORTHANC__POSTGRESQL__ENABLE_INDEX: "true"
      ORTHANC__POSTGRESQL__ENABLE_STORAGE: "false"
      ORTHANC__POSTGRESQL__HOST: postgres
      ORTHANC__POSTGRESQL__PORT: "5432"
      ORTHANC__POSTGRESQL__DATABASE: ${POSTGRES_DB:-orthanc}
      ORTHANC__POSTGRESQL__USERNAME: ${POSTGRES_USER:-orthanc}
      ORTHANC__POSTGRESQL__PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      DICOM_WEB_PLUGIN_ENABLED: "true"
      STONE_WEB_VIEWER_PLUGIN_ENABLED: "true"
      POSTGRESQL_PLUGIN_ENABLED: "true"
    volumes:
      - ./orthanc/orthanc.json:/etc/orthanc/orthanc.json:ro
      - ${ORTHANC_STORAGE:-/srv/docker/kaospacs/orthanc-storage}:/var/lib/orthanc/storage
    healthcheck:
      test: ["CMD", "python3", "/probes/test-aliveness.py"]
      interval: 10s
      timeout: 5s
      retries: 12

  mwl:
    build:
      context: ./mwl
    container_name: kaospacs-mwl
    restart: unless-stopped
    ports:
      - "${MWL_PORT:-105}:105"
      - "127.0.0.1:${MWL_API_PORT:-8055}:8055"
    environment:
      TZ: ${TZ:-Asia/Seoul}
      MWL_AET: ${MWL_AET:-VIEWREX_WL}
      MWL_PORT: "105"
      MWL_API_HOST: "0.0.0.0"
      MWL_API_PORT: "8055"
      MWL_AUDIT_DB: /app/data/mwl_audit.sqlite3
      WORKLIST_SEED_PATH: /app/config/worklist.json
      WORKLIST_PATH: /app/data/worklist.json
    volumes:
      - ./mwl/config:/app/config:ro
      - ${MWL_DATA:-/srv/docker/kaospacs/mwl}:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1', 105), 2).close()"]
      interval: 10s
      timeout: 5s
      retries: 12

  gateway:
    build:
      context: ./gateway
    container_name: kaospacs-gateway
    restart: unless-stopped
    depends_on:
      orthanc:
        condition: service_healthy
      mwl:
        condition: service_healthy
    ports:
      - "${GATEWAY_HTTP_BIND:-0.0.0.0}:${GATEWAY_HTTP_PORT:-8060}:8060"
      - "0.0.0.0:104:104"
    environment:
      TZ: ${TZ:-Asia/Seoul}
      GATEWAY_HTTP_HOST: 0.0.0.0
      GATEWAY_HTTP_PORT: "8060"
      ORTHANC_URL: http://orthanc:8042
      ORTHANC_TIMEOUT_SECONDS: ${ORTHANC_TIMEOUT_SECONDS:-3}
      MWL_API_URL: http://mwl:8055
      MWL_API_TIMEOUT_SECONDS: "3"
      GATEWAY_AUDIT_DB: /app/data/gateway_audit.sqlite3
      GATEWAY_QUEUE_DB: /app/data/gateway_queue.sqlite3
      GATEWAY_API_TOKEN: ${GATEWAY_API_TOKEN:-}
      GATEWAY_DICOM_ENABLED: "true"
      GATEWAY_DICOM_AET: VIEWREX
      GATEWAY_DICOM_PORT: "104"
      GATEWAY_DICOM_BIND: 0.0.0.0
      GATEWAY_DICOM_STORAGE_DIR: /app/data/dicom-inbox
      GATEWAY_DICOM_QUEUE_ENABLED: ${GATEWAY_DICOM_QUEUE_ENABLED:-false}
      GATEWAY_QUEUE_WORKER_ENABLED: ${GATEWAY_QUEUE_WORKER_ENABLED:-false}
      GATEWAY_QUEUE_POLL_INTERVAL_SECONDS: ${GATEWAY_QUEUE_POLL_INTERVAL_SECONDS:-5}
      GATEWAY_QUEUE_MAX_ATTEMPTS: ${GATEWAY_QUEUE_MAX_ATTEMPTS:-10}
      GATEWAY_DICOM_FORWARD_MODE: ${GATEWAY_DICOM_FORWARD_MODE:-direct}
      GATEWAY_DICOM_FORWARD_ENABLED: "true"
      ORTHANC_DICOM_HOST: ${ORTHANC_DICOM_HOST:-orthanc}
      ORTHANC_DICOM_PORT: ${ORTHANC_INTERNAL_DICOM_PORT:-11112}
      ORTHANC_DICOM_AET: VIEWREX
      GATEWAY_FORWARDING_AET: ${GATEWAY_FORWARDING_AET:-KAOSPACS_GW}
      GATEWAY_DICOM_FORWARD_TIMEOUT_SECONDS: ${GATEWAY_DICOM_FORWARD_TIMEOUT_SECONDS:-10}
      GATEWAY_DICOM_INSPECTION_ENABLED: ${GATEWAY_DICOM_INSPECTION_ENABLED:-true}
      GATEWAY_DICOM_INSPECTION_REPORT_PATH: /app/data/dicom_inspection.jsonl
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ${GATEWAY_DATA:-/srv/docker/kaospacs/gateway}:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8060/health', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 12

  web:
    build:
      context: ./web
    container_name: kaospacs-web
    restart: unless-stopped
    depends_on:
      orthanc:
        condition: service_healthy
    ports:
      - "${WEB_HTTP_BIND:-0.0.0.0}:${WEB_PORT:-80}:8081"
    environment:
      TZ: ${TZ:-Asia/Seoul}
      WEB_HTTP_HOST: 0.0.0.0
      WEB_HTTP_PORT: "8081"
      WEB_ORTHANC_URL: http://orthanc:8042
      WEB_ORTHANC_PUBLIC_URL: ${WEB_ORTHANC_PUBLIC_URL:-http://192.168.0.200:8042}
      WEASIS_DICOMWEB_URL: ${WEASIS_DICOMWEB_URL:-http://192.168.0.200:8042/dicom-web}
      WEB_STUDY_LIMIT: ${WEB_STUDY_LIMIT:-100}
      WEB_UPLOAD_MAX_BYTES: ${WEB_UPLOAD_MAX_BYTES:-26214400}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/health', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 12
